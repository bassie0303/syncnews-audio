# Railway 変換ワーカー設定（011_multilang_news/backend をルートにデプロイ）
[build]
builder = "nixpacks"

[deploy]
# PYTHONUTF8=1 は必須。Linuxコンテナの C ロケールだと postgrest/httpx が
# 日本語ペイロードを ascii で encode しようとして UnicodeEncodeError になる。
# 起動コマンドで明示し、env 注入タイミングに依存させない。
#
# ※ apt導入のネイティブlib(/usr/lib/x86_64-linux-gnu)は Nix版Pythonのローダが
#   探索しないため、startCommand での LD_LIBRARY_PATH 注入は不可（Railwayが
#   インライン代入を解釈せずコンテナ起動が壊れる）。代わりに main.py 側で
#   ctypes 先読み(_ensure_azure_libs)して Azure SDK の依存を解決している。
startCommand = "python -X utf8 -m uvicorn main:app --host 0.0.0.0 --port ${PORT}"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
